name: Ci Cd Pipeline

on:
  push:
    branches: [ main ] 

jobs:
  builds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHUb
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        
      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp-flask:latest .
    
      - name: Push Image
        run: docker push ${{ secrets.USER_PASSWORD }}/myapp-flask:latest
        